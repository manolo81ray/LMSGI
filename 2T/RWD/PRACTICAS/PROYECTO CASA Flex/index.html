<!DOCTYPE html>
<html lang="en">
<head>

    <title>La Casa de tus sueños</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Debemos de Desactivar el media para movil para que Funcione de Forma natural el Mobile First Design
    Esto lo hacemos para que teniendo de base el movil.css sea el mismo para los demas dispositivos 
    y si queremos que cambie por ejemplo el desktop modifiquemos solo el codigo necesario 
    sin necesidad de reescribirlo todo -->
     <link rel="stylesheet" href="CSS/movil.css">
     <link rel="stylesheet" href="CSS/tablet.css" media="screen and (min-width: 768px)">
     <link rel="stylesheet" href="CSS/desktop.css" media="screen and (min-width: 1024px)">
</head>
<body>

        <div class="social-icons">Iconos Sociales</div>
        </div>
        <div class="info-bar">
        <h1 class="slogan">La Casa de tus sueños</h1>
        <div class="contact">
            <span>direccion</span>
            <span>correo</span>
        </div>
        <nav class="menu">Homee-Viviendas</nav>
        </div>
    </div>
    </header>
    <main>
        <h4>Viviendas en Mojacar</h4>
    </main> 
</body>
</html>
