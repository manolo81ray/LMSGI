$kind: http-example
request:
  url: "{{baseUrl}}/proyectos?id=string&titulo=string&url=string&fecha_creacion=string&tecnologia=string&etiquetas=string&descripcion=string&img_web=string&select=string&order=string&offset=string&limit=string"
  method: GET
  headers:
    - key: Range
      value: string
      description: Limiting and Pagination
    - key: Range-Unit
      value: items
      description: Limiting and Pagination
    - key: Prefer
      value: count=none
      description: Preference
    - key: Accept
      value: application/json
  queryParams:
