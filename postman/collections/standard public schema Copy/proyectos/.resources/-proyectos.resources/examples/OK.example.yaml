      value: string
    - key: descripcion
      value: string
    - key: img_web
      value: string
    - key: select
      value: string
      description: Filtering Columns
    - key: order
      value: string
      description: Ordering
    - key: offset
      value: string
      description: Limiting and Pagination
    - key: limit
      value: string
      description: Limiting and Pagination
