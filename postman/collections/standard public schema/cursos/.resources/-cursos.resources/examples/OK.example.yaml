$kind: http-example
request:
  url: "{{baseUrl}}/cursos?id_curso=string&created_at=string&titulo=string&catego\
    ria=string&academia=string&precio=string&select=string&order=string&offset=\
    string&limit=string"
  method: GET
  headers:
    - key: Range
      value: string
      description: Limiting and Pagination
    - key: Range-Unit
      value: items
      description: Limiting and Pagination
    - key: Prefer
      value: count=none
      description: Preference
    - key: Accept
      value: application/json
  queryParams:
    - key: id_curso
      value: string
    - key: created_at
      value: string
    - key: titulo
      value: string
    - key: categoria
      value: string
    - key: academia
      value: string
    - key: precio
      value: string
    - key: select
      value: string
      description: Filtering Columns
    - key: order
      value: string
      description: Ordering
    - key: offset
      value: string
      description: Limiting and Pagination
    - key: limit
      value: string
      description: Limiting and Pagination
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      [
        {
          "id_curso": "gen_random_uuid()",
          "created_at": "now()",
          "titulo": "string",
          "categoria": "string",
          "academia": "string",
          "precio": 9677
        },
        {
          "id_curso": "gen_random_uuid()",
          "created_at": "now()",
          "titulo": "string",
          "categoria": "string",
          "academia": "string",
          "precio": 8912
        }
      ]
order: 1000
